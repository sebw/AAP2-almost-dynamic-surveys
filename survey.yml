---
- name: Update Survey From External API
  hosts: localhost
  gather_facts: false

  vars:
   target_job_template: "Deploy Application"

  tasks:
  - name: Update survey
    ansible.controller.job_template:
      controller_host: "{{ controller_host }}"
      controller_username: "{{ controller_username }}"
      controller_password: "{{ controller_password }}"
      validate_certs: True
      name: "{{ target_job_template }}"
      survey_enabled: true
      survey_spec:
        name: Dynamic Environment Survey
        description: Generated from external API
        spec:
        - question_name: Environment
          question_description: Select deployment target
          variable: environment
          required: true
          type: multiplechoice
         choices: "{{ survey_choices }}"
          default: "{{ survey_choices[0] }}"
